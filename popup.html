<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Freeze Tabs</title>
    <style>
      :root {
        --blue: #3b82f6;
        --blue-dark: #2563eb;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --panel: #f1f5f9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 260px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: #fff;
        padding: 12px;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      h1 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); }

      /* Live status panel */
      #panel {
        background: var(--panel);
        border-radius: 8px;
        padding: 9px 11px;
        margin-bottom: 10px;
      }
      #headline {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      #headline b { color: var(--blue-dark); }
      #sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

      button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 9px 11px;
        margin: 6px 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
        color: var(--ink);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: background .12s, border-color .12s, transform .04s;
      }
      button:hover { background: #eef2ff; border-color: var(--blue); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: .55; cursor: default; }
      button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
      button.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }

      #status {
        margin-top: 10px;
        min-height: 16px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      #status.ok { color: var(--blue-dark); font-weight: 600; }
    </style>
  </head>
  <body>
    <h1><span class="dot"></span> Freeze Tabs</h1>

    <div id="panel">
      <div id="headline">…</div>
      <div id="sub"></div>
    </div>

    <button data-action="FREEZE_THIS">Freeze this tab</button>
    <button data-action="FREEZE_OTHERS">Freeze everything but this tab</button>
    <button data-action="FREEZE_WINDOW">Freeze all tabs in this window</button>
    <button class="primary" data-action="FREEZE_ALL">Freeze all tabs</button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
